services:
  postgres:
    image: postgres:16-alpine
    container_name: coachai-postgres
    environment:
      POSTGRES_USER: coachai
      POSTGRES_PASSWORD: coachai
      POSTGRES_DB: coachai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachai -d coachai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coachai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coachai-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://coachai:coachai@postgres:5432/coachai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir src"

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coachai-celery-worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://coachai:coachai@postgres:5432/coachai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coachai-celery-beat
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://coachai:coachai@postgres:5432/coachai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  postgres_data:
  redis_data:
